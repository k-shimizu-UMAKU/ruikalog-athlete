<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RUIKALOG</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e1a14; }
  input[type=range] { accent-color: #c9a84c; }
  input[type=date], input[type=time] { color-scheme: dark; }
</style>
</head>
<body>
<div id="root"></div>

<script>
  
  const firebaseConfig = {
    apiKey: "AIzaSyCNqNfuh_N_sNYDaqhYc5wxhOEm4uA05Yo",
    authDomain: "ruikalog.firebaseapp.com",
    databaseURL: "https://ruikalog-default-rtdb.firebaseio.com",
    projectId: "ruikalog",
    storageBucket: "ruikalog.firebasestorage.app",
    messagingSenderId: "964673874358",
    appId: "1:964673874358:web:e2c5ccd22ddd4e346e7917"
  };
  

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function dbGet(key) {
    return db.ref(key).get().then(s => s.exists() ? JSON.parse(s.val()) : null).catch(() => null);
  }
  function dbSet(key, val) {
    return db.ref(key).set(JSON.stringify(val)).catch(() => {});
  }
  function dbListen(key, cb) {
    return db.ref(key).on("value", snap => { cb(snap.exists() ? JSON.parse(snap.val()) : null); });
  }
</script>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const today   = () => new Date().toISOString().split("T")[0];
const nowTime = () => new Date().toTimeString().slice(0, 5);
const fmtDate = (d) => d ? d.replace(/-/g, "/") : "";

// ── ROOT ──
function App() {
  const [apiKey, setApiKey] = useState(localStorage.getItem("rl_apikey") || "");
  const [showKeyInput, setShowKeyInput] = useState(!localStorage.getItem("rl_apikey"));
  const [records, setRecords] = useState([]);
  const [advices, setAdvices] = useState([]);
  const [tab, setTab]         = useState("meal");
  const [toast, setToast]     = useState(null);

  // Firebase リアルタイム同期
  useEffect(() => {
    dbListen("rl2_records", r => { if (r) setRecords(r); });
    dbListen("rl2_advices", a => { if (a) setAdvices(a); });
  }, []);

  const pushRecord = async (rec) => {
    const next = [rec, ...records];
    setRecords(next);
    await dbSet("rl2_records", next);
  };

  const markAdvicesRead = async () => {
    const next = advices.map(a => ({ ...a, readByAthlete: true }));
    setAdvices(next);
    await dbSet("rl2_advices", next);
  };

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2600); };
  const unreadAdvices = advices.filter(a => !a.readByAthlete).length;

  const TABS = [
    { id: "meal",      icon: "🍽", name: "食事" },
    { id: "body",      icon: "📊", name: "体測定" },
    { id: "condition", icon: "🌿", name: "体調" },
    { id: "training",  icon: "⛳", name: "練習" },
    { id: "inbox",     icon: "💬", name: "メッセージ", count: unreadAdvices },
    { id: "history",   icon: "📋", name: "履歴" },
  ];

  return (
    <div style={S.root}>
      <div style={S.header}>
        <div>
          <div style={S.logo}>RUIKA<span style={{color:"#f2ead8"}}>LOG</span></div>
          <div style={S.headerDate}>{new Date().toLocaleDateString("ja-JP",{month:"long",day:"numeric",weekday:"short"})}</div>
        </div>
        <div style={S.syncPill}>
          <span style={{...S.syncDot, background:"#4a9b6f"}} />
          <span>クラウド連携中</span>
        </div>
      </div>

      {showKeyInput && (
        <div style={{background:"#1c2b21",borderBottom:"1px solid #2e4235",padding:"12px 16px"}}>
          <div style={{fontSize:11,color:"#c9a84c",marginBottom:6,fontWeight:700}}>🔑 AIキー設定（初回のみ）</div>
          <div style={{display:"flex",gap:8}}>
            <input style={{...S.inp,flex:1,fontSize:12}} type="password" placeholder="sk-ant-..." 
              value={apiKey} onChange={e=>setApiKey(e.target.value)}/>
            <button style={{padding:"8px 14px",background:"#c9a84c",border:"none",borderRadius:8,color:"#0e1a14",fontWeight:700,cursor:"pointer",fontFamily:"inherit",fontSize:12,whiteSpace:"nowrap"}}
              onClick={()=>{localStorage.setItem("rl_apikey",apiKey);setShowKeyInput(false);}}>保存</button>
          </div>
          <div style={{fontSize:10,color:"#607a68",marginTop:5}}>console.anthropic.com でAPIキーを取得できます。体測定の自動読み取りに使用します。</div>
        </div>
      )}
      <div style={S.tabRow}>
        {TABS.map(t => (
          <button key={t.id} style={tab===t.id?S.tabActive:S.tab}
            onClick={() => { setTab(t.id); if(t.id==="inbox") markAdvicesRead(); }}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:10}}>{t.name}</span>
            {t.count>0 && <span style={S.tabBadge}>{t.count}</span>}
          </button>
        ))}
      </div>

      <div style={S.panelWrap}>
        {tab==="meal"      && <MealForm      onSave={r=>{pushRecord(r);showToast("📤 送信しました！");setTab("history");}}/>}
        {tab==="body"      && <BodyForm      apiKey={apiKey} onSave={r=>{pushRecord(r);showToast("📤 送信しました！");setTab("history");}}/>}
        {tab==="condition" && <ConditionForm onSave={r=>{pushRecord(r);showToast("📤 送信しました！");setTab("history");}}/>}
        {tab==="training"  && <TrainingForm  onSave={r=>{pushRecord(r);showToast("📤 送信しました！");setTab("history");}}/>}
        {tab==="inbox"     && <InboxPanel    advices={advices}/>}
        {tab==="history"   && <HistoryPanel  records={records}/>}
      </div>

      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

// ── INBOX ──
function InboxPanel({advices}) {
  if (!advices.length) return (
    <div style={{textAlign:"center",padding:"60px 24px",color:"#8a9e90"}}>
      <div style={{fontSize:52,marginBottom:14}}>💬</div>
      <div style={{fontSize:15,lineHeight:1.8}}>コンサルタントからの<br/>メッセージがここに届きます</div>
      <div style={{fontSize:12,color:"#607a68",marginTop:10}}>食事を記録するとアドバイスが届きます</div>
    </div>
  );
  return (
    <div>
      <div style={S.notice}>コンサルタントからのメッセージです。</div>
      {advices.map(a => (
        <div key={a.id} style={S.adviceBubble}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:10,alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={S.consultAvatar}>👨‍🍳</div>
              <div>
                <div style={{fontSize:12,color:"#c9a84c",fontWeight:700}}>アスリートフードコンサルタント</div>
                <div style={{fontSize:10,color:"#8a9e90"}}>{fmtDate(a.date)}</div>
              </div>
            </div>
            <span style={{fontSize:10,background:a.type==="report"?"rgba(201,168,76,.15)":"rgba(74,155,111,.15)",color:a.type==="report"?"#c9a84c":"#4a9b6f",border:`1px solid ${a.type==="report"?"rgba(201,168,76,.3)":"rgba(74,155,111,.3)"}`,padding:"2px 8px",borderRadius:10}}>
              {a.type==="report"?"📄 週次レポート":"💬 アドバイス"}
            </span>
          </div>
          <div style={{fontSize:13,color:"#c8bfa8",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{a.text}</div>
        </div>
      ))}
    </div>
  );
}

// ── HISTORY ──
function HistoryPanel({records}) {
  const tColor={meal:"#4a9b6f",body:"#c9a84c",condition:"#d97070",training:"#7099c9"};
  const tLabel={meal:"🍽 食事",body:"📊 体測定",condition:"🌿 体調",training:"⛳ 練習"};
  if (!records.length) return (
    <div style={{textAlign:"center",padding:"60px 20px",color:"#8a9e90"}}>
      <div style={{fontSize:48,marginBottom:12}}>📋</div>
      <div>まだ記録がありません</div>
    </div>
  );
  return (
    <div>
      <div style={{fontSize:12,color:"#8a9e90",marginBottom:14}}>送信済み {records.length} 件</div>
      {records.map(r => {
        const c=tColor[r.type]||"#8a9e90";
        let s="";
        if(r.type==="meal")      s=(r.timing||[]).join("・")+(r.note?" — "+r.note.slice(0,40):"");
        if(r.type==="body")      s=[r.weight&&`${r.weight}kg`,r.fat&&`体脂肪 ${r.fat}%`].filter(Boolean).join("  ");
        if(r.type==="condition") s=[r.overall&&`体調 ${"🤒😓😐😊💪"[+r.overall-1]}`,r.sleepStart&&r.sleepEnd&&`💤 ${r.sleepStart}〜${r.sleepEnd}`].filter(Boolean).join("  ");
        if(r.type==="training")  s=[r.trainType,r.duration&&`${r.duration}分`,r.score&&`🏆 ${r.score}`].filter(Boolean).join("  ");
        return (
          <div key={r.id} style={{...S.tlItem,borderLeft:`3px solid ${c}`}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
              <span style={{fontSize:11,fontWeight:700,color:c,background:c+"22",padding:"2px 8px",borderRadius:10}}>{tLabel[r.type]}</span>
              <span style={{fontSize:11,color:"#8a9e90"}}>{fmtDate(r.date)}{r.time?" "+r.time:""}</span>
            </div>
            <div style={{fontSize:13,color:"#c8bfa8",lineHeight:1.6}}>{s||"記録あり"}</div>
            {r.photos?.length>0&&<div style={{display:"flex",gap:6,marginTop:8}}>{r.photos.slice(0,4).map((src,i)=><img key={i} src={src} alt="" style={{width:52,height:52,borderRadius:8,objectFit:"cover"}}/>)}</div>}
          </div>
        );
      })}
    </div>
  );
}

// ── MEAL FORM ──
function MealForm({onSave}) {
  const [timing,setTiming]=useState([]);const [date,setDate]=useState(today());const [time,setTime]=useState(nowTime());
  const [note,setNote]=useState("");const [feeling,setFeeling]=useState(null);const [water,setWater]=useState(1.0);const [photos,setPhotos]=useState([]);
  const hp=(e)=>{Array.from(e.target.files).forEach(f=>{const rd=new FileReader();rd.onload=ev=>setPhotos(p=>[...p,ev.target.result]);rd.readAsDataURL(f);});e.target.value="";};
  const save=async()=>{await onSave({id:Date.now(),type:"meal",date,time,timing,note,feeling,water,photos,createdAt:new Date().toISOString()});setTiming([]);setNote("");setFeeling(null);setWater(1.0);setPhotos([]);};
  return(
    <div>
      <div style={S.notice}><b style={{color:"#c9a84c"}}>📸 食事の記録</b><br/>コンビニ・外食でもOK！写真＋メモで気軽に</div>
      <Card title="🕐 タイミング">
        <Chips opts={["朝食","練習前","昼食","補食","ラウンド中","ラウンド後","夕食","夜食"]} sel={timing} multi onChange={setTiming}/>
        <R2><FG label="日付"><input style={S.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></FG><FG label="時刻"><input style={S.inp} type="time" value={time} onChange={e=>setTime(e.target.value)}/></FG></R2>
      </Card>
      <Card title="📷 写真">
        <label style={S.uploadArea}><input type="file" accept="image/*" multiple style={{display:"none"}} onChange={hp}/><div style={{fontSize:32}}>🍱</div><div style={{color:"#8a9e90",fontSize:12,marginTop:4}}>タップして写真追加（複数可）</div></label>
        {photos.length>0&&<div style={S.photoGrid}>{photos.map((src,i)=><div key={i} style={S.thumb}><img src={src} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/><button style={S.delBtn} onClick={()=>setPhotos(p=>p.filter((_,j)=>j!==i))}>×</button></div>)}</div>}
      </Card>
      <Card title="📝 メモ・体感">
        <FG label="食べたもの・気づき"><textarea style={{...S.inp,resize:"vertical",minHeight:80,lineHeight:1.7}} value={note} onChange={e=>setNote(e.target.value)} placeholder="例：サラダチキン＋おにぎり。ナッツ持参。"/></FG>
        <FG label="食後の体感"><MoodR emojis={["😫","😕","😐","😊","🤩"]} val={feeling} onChange={setFeeling}/><div style={{fontSize:10,color:"#8a9e90",textAlign:"center",marginTop:4}}>重い・しんどい ← → 軽い・元気</div></FG>
      </Card>
      <Card title="💧 水分補給">
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:11,color:"#8a9e90"}}>0L</span>
          <input type="range" min={0} max={40} value={water*10} style={{flex:1}} onChange={e=>setWater(e.target.value/10)}/>
          <span style={{fontSize:20,fontWeight:700,color:"#c9a84c",minWidth:48}}>{water.toFixed(1)}L</span>
        </div>
      </Card>
      <SendBtn onClick={save}>📤 食事を送信する</SendBtn>
    </div>
  );
}

// ── BODY FORM ──
function BodyForm({onSave, apiKey}) {
  const [date,    setDate]    = useState(today());
  const [weight,  setWeight]  = useState("");
  const [fat,     setFat]     = useState("");
  const [muscle,  setMuscle]  = useState("");
  const [bmi,     setBmi]     = useState("");
  const [waist,   setWaist]   = useState("");
  const [bmr,     setBmr]     = useState("");
  const [visceral,setVisceral]= useState("");
  const [inbody,  setInbody]  = useState("");
  const [scanImg, setScanImg] = useState(null);
  const [scanning,setScanning]= useState(false);
  const [scanDone,setScanDone]= useState(false);
  const [scanError,setScanError]= useState("");
  const [note,    setNote]    = useState("");

  const save = async () => {
    await onSave({id:Date.now(),type:"body",date,weight,fat,muscle,bmi,waist,bmr,visceral,inbody,scanImg,note,createdAt:new Date().toISOString()});
    setWeight("");setFat("");setMuscle("");setBmi("");setWaist("");setBmr("");setVisceral("");setInbody("");setScanImg(null);setScanDone(false);setNote("");
  };

  const handleScan = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const rd = new FileReader();
    rd.onload = async (ev) => {
      const src = ev.target.result;
      setScanImg(src);
      setScanning(true);
      setScanDone(false);
      setScanError("");
      try {
        if (!apiKey) throw new Error("APIキーが未設定です。画面上部に入力してください。");
        // 画像を圧縮してからAPIに送る（大きい画像対策）
        const compressedSrc = await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement("canvas");
            const MAX = 1200;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / h); h = MAX; }
            }
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", 0.85));
          };
          img.src = src;
        });
        const base64 = compressedSrc.split(",")[1];
        const mediaType = "image/jpeg";
        const prompt = "これはInBodyの体組成測定レポートです。以下の項目を読み取り、JSONのみで返してください（前後の説明不要）:\n{\"weight\":\"体重kg\",\"fat\":\"体脂肪率%\",\"muscle\":\"筋肉量kg（Soft Lean Mass）\",\"bmi\":\"BMI\",\"waist\":\"腹囲cm\",\"bmr\":\"基礎代謝量kcal\",\"visceral\":\"内臓脂肪レベル\",\"inbody\":\"InBody点数\",\"date\":\"測定日YYYY-MM-DD形式\"}\n数値のみ（単位なし）。不明な項目は空文字。";
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST", headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body: JSON.stringify({
            model:"claude-sonnet-4-20250514", max_tokens:500,
            messages:[{role:"user",content:[
              {type:"image",source:{type:"base64",media_type:mediaType,data:base64}},
              {type:"text",text:prompt}
            ]}]
          })
        });
        if (!res.ok) {
          const errBody = await res.text();
          throw new Error("APIエラー " + res.status + ": " + errBody.slice(0,200));
        }
        const d = await res.json();
        const raw = d.content?.find(c=>c.type==="text")?.text || "";
        const jsonMatch = raw.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("AIの返答: " + raw.slice(0,300));
        const parsed = JSON.parse(jsonMatch[0]);
        if (parsed.weight)   setWeight(parsed.weight);
        if (parsed.fat)      setFat(parsed.fat);
        if (parsed.muscle)   setMuscle(parsed.muscle);
        if (parsed.bmi)      setBmi(parsed.bmi);
        if (parsed.waist)    setWaist(parsed.waist);
        if (parsed.bmr)      setBmr(parsed.bmr);
        if (parsed.visceral) setVisceral(parsed.visceral);
        if (parsed.inbody)   setInbody(parsed.inbody);
        if (parsed.date)     setDate(parsed.date);
        setScanDone(true);
      } catch(err) {
        setScanError(err.message);
      }
      setScanning(false);
    };
    rd.readAsDataURL(file);
    e.target.value = "";
  };

  return(
    <div>
      <div style={S.notice}><b style={{color:"#c9a84c"}}>📏 体測定の記録</b><br/>InBodyの結果票を写真で撮るだけで自動入力できます！</div>

      <Card title="📸 InBodyレポートを読み取る">
        {!scanImg ? (
          <label style={{...S.uploadArea, borderColor:"rgba(201,168,76,0.4)"}}>
            <input type="file" accept="image/*" style={{display:"none"}} onChange={handleScan}/>
            <div style={{fontSize:36,marginBottom:6}}>📄</div>
            <div style={{fontSize:14,color:"#f2ead8",fontWeight:500}}>InBodyの結果票をタップして追加</div>
            <div style={{fontSize:11,color:"#8a9e90",marginTop:4}}>写真を撮るかギャラリーから選択 → 数値が自動入力されます</div>
          </label>
        ) : (
          <div>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:10}}>
              <img src={scanImg} alt="InBody" style={{width:80,height:80,objectFit:"cover",borderRadius:8,flexShrink:0}}/>
              <div style={{flex:1}}>
                {scanning && <div style={{background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.3)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#c9a84c"}}>🔍 数値を読み取り中...</div>}
                {scanDone && <div style={{background:"rgba(74,155,111,0.1)",border:"1px solid rgba(74,155,111,0.3)",borderRadius:8,padding:"10px 12px",fontSize:12,color:"#4a9b6f"}}>✅ 自動入力完了！内容を確認してください。</div>}
                {scanError && <div style={{background:"rgba(217,112,112,0.1)",border:"1px solid rgba(217,112,112,0.4)",borderRadius:8,padding:"10px 12px",fontSize:11,color:"#d97070",wordBreak:"break-all"}}>❌ {scanError}</div>}
              </div>
            </div>
            <button style={{fontSize:11,color:"#d97070",background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline"}} onClick={()=>{setScanImg(null);setScanDone(false);}}>📄 別の写真を使う</button>
          </div>
        )}
      </Card>

      <Card title="📅 測定日"><input style={S.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></Card>

      <Card title="⚖️ 体組成データ">
        <R2>
          <FG label="体重 (kg)"><input style={S.inp} type="number" value={weight} onChange={e=>setWeight(e.target.value)} placeholder="71.9" step="0.1"/></FG>
          <FG label="体脂肪率 (%)"><input style={S.inp} type="number" value={fat} onChange={e=>setFat(e.target.value)} placeholder="36.9" step="0.1"/></FG>
        </R2>
        <R2>
          <FG label="筋肉量 (kg)"><input style={S.inp} type="number" value={muscle} onChange={e=>setMuscle(e.target.value)} placeholder="42.8" step="0.1"/></FG>
          <FG label="BMI"><input style={S.inp} type="number" value={bmi} onChange={e=>setBmi(e.target.value)} placeholder="28.8" step="0.1"/></FG>
        </R2>
        <R2>
          <FG label="腹囲 (cm)"><input style={S.inp} type="number" value={waist} onChange={e=>setWaist(e.target.value)} placeholder="91.5" step="0.5"/></FG>
          <FG label="基礎代謝 (kcal)"><input style={S.inp} type="number" value={bmr} onChange={e=>setBmr(e.target.value)} placeholder="1349"/></FG>
        </R2>
        <R2>
          <FG label="内臓脂肪レベル"><input style={S.inp} type="number" value={visceral} onChange={e=>setVisceral(e.target.value)} placeholder="11"/></FG>
          <FG label="InBody点数"><input style={S.inp} type="number" value={inbody} onChange={e=>setInbody(e.target.value)} placeholder="72"/></FG>
        </R2>
      </Card>

      <FG label="メモ（体の変化・気づき）">
        <textarea style={{...S.inp,resize:"vertical",minHeight:64,lineHeight:1.7}} value={note} onChange={e=>setNote(e.target.value)} placeholder="例：先週より体脂肪が増えた。むくみあり。"/>
      </FG>
      <SendBtn onClick={save}>📤 体測定を送信する</SendBtn>
    </div>
  );
}

// ── CONDITION FORM ──
function ConditionForm({onSave}) {
  const [date,setDate]=useState(today());const [overall,setOverall]=useState(null);const [mental,setMental]=useState(null);
  const [sleepStart,setSleepStart]=useState("");const [sleepEnd,setSleepEnd]=useState(nowTime());
  const [period,setPeriod]=useState(false);const [pms,setPms]=useState(false);const [bowel,setBowel]=useState([]);const [note,setNote]=useState("");const [medNote,setMedNote]=useState("");
  const save=async()=>{await onSave({id:Date.now(),type:"condition",date,overall,mental,sleepStart,sleepEnd,period,pms,bowel,note,medNote,createdAt:new Date().toISOString()});setOverall(null);setMental(null);setPeriod(false);setPms(false);setBowel([]);setNote("");setMedNote("");};
  return(
    <div>
      <div style={{...S.notice,borderColor:"rgba(217,112,112,0.3)",background:"rgba(217,112,112,0.07)"}}><b style={{color:"#d97070"}}>🔒 プライバシー配慮</b> — コンサルタントのみ確認できます</div>
      <Card title="📅 記録日"><input style={S.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></Card>
      <Card title="💪 コンディション">
        <FG label="全体的な体調"><MoodR emojis={["🤒","😓","😐","😊","💪"]} val={overall} onChange={setOverall}/></FG>
        <FG label="集中力・メンタル"><MoodR emojis={["😵","😞","😑","🎯","🔥"]} val={mental} onChange={setMental}/></FG>
      </Card>
      <Card title="💤 睡眠"><R2><FG label="就寝"><input style={S.inp} type="time" value={sleepStart} onChange={e=>setSleepStart(e.target.value)}/></FG><FG label="起床"><input style={S.inp} type="time" value={sleepEnd} onChange={e=>setSleepEnd(e.target.value)}/></FG></R2></Card>
      <Card title="🌸 女性特有の体調（任意）">
        <Toggle label="生理中" val={period} onChange={setPeriod}/>
        <Toggle label="生理前（PMS）" val={pms} onChange={setPms}/>
        <div style={{marginTop:10}}><FG label="詳細メモ"><textarea style={{...S.inp,resize:"vertical",minHeight:60,lineHeight:1.7}} value={note} onChange={e=>setNote(e.target.value)} placeholder="例：生理3日目、腹痛少しあり。"/></FG></div>
      </Card>
      <Card title="🚽 腸内環境"><Chips opts={["毎食後","2回","1回","なし","便秘気味"]} sel={bowel} multi onChange={setBowel}/></Card>
      <Card title="💊 服薬・サプリ"><textarea style={{...S.inp,resize:"vertical",minHeight:60,lineHeight:1.7}} value={medNote} onChange={e=>setMedNote(e.target.value)} placeholder="例：ビタミンC 1000mg、プロテイン（朝）"/></Card>
      <SendBtn onClick={save}>📤 体調を送信する</SendBtn>
    </div>
  );
}

// ── TRAINING FORM ──
function TrainingForm({onSave}) {
  const [date,setDate]=useState(today());const [trainType,setTrainType]=useState("");const [duration,setDuration]=useState("");
  const [intensity,setIntensity]=useState([]);const [score,setScore]=useState("");const [snacks,setSnacks]=useState([]);
  const [caffeine,setCaffeine]=useState([]);const [pre,setPre]=useState("");const [post,setPost]=useState("");const [note,setNote]=useState("");
  const save=async()=>{await onSave({id:Date.now(),type:"training",date,trainType,duration,intensity,score,snacks,caffeine,pre,post,note,createdAt:new Date().toISOString()});setTrainType("");setDuration("");setIntensity([]);setScore("");setSnacks([]);setCaffeine([]);setNote("");};
  return(
    <div>
      <div style={S.notice}><b style={{color:"#c9a84c"}}>⛳ 練習・試合の記録</b><br/>食事との相関が見えてきます</div>
      <Card title="📅 日付・種別">
        <R2><FG label="日付"><input style={S.inp} type="date" value={date} onChange={e=>setDate(e.target.value)}/></FG>
        <FG label="種別"><select style={S.inp} value={trainType} onChange={e=>setTrainType(e.target.value)}><option value="">選択</option>{["ラウンド（練習）","ラウンド（試合）","ドライビングレンジ","アプローチ練習","パッティング練習","フィジカルトレーニング","オフ"].map(o=><option key={o}>{o}</option>)}</select></FG></R2>
      </Card>
      <Card title="⏱ 練習量・強度">
        <R2><FG label="時間（分）"><input style={S.inp} type="number" value={duration} onChange={e=>setDuration(e.target.value)} placeholder="180"/></FG><FG label="試合スコア"><input style={S.inp} type="text" value={score} onChange={e=>setScore(e.target.value)} placeholder="72 (+2)"/></FG></R2>
        <FG label="強度"><Chips opts={["🟢 軽め","🟡 普通","🔴 ハード"]} sel={intensity} onChange={setIntensity}/></FG>
      </Card>
      <Card title="🏆 試合前後の状態">
        <R2><FG label="試合前"><select style={S.inp} value={pre} onChange={e=>setPre(e.target.value)}><option value="">選択</option>{["絶好調","良い","普通","不安あり","しんどい"].map(o=><option key={o}>{o}</option>)}</select></FG>
        <FG label="試合後"><select style={S.inp} value={post} onChange={e=>setPost(e.target.value)}><option value="">選択</option>{["充実感あり","普通","疲労感あり","後半失速した","集中力切れた"].map(o=><option key={o}>{o}</option>)}</select></FG></R2>
      </Card>
      <Card title="🍬 補食・カフェイン">
        <FG label="ラウンド中の補食"><Chips opts={["ゼリー飲料","手作りゼリー","ナッツ","マスカット","ドライフルーツ","おにぎり","なし"]} sel={snacks} multi onChange={setSnacks}/></FG>
        <FG label="カフェインのタイミング"><Chips opts={["スタート2h前","スタート直前","後半で摂取","なし"]} sel={caffeine} onChange={setCaffeine} color="#7099c9"/></FG>
      </Card>
      <FG label="メモ・気づき"><textarea style={{...S.inp,resize:"vertical",minHeight:72,lineHeight:1.7}} value={note} onChange={e=>setNote(e.target.value)} placeholder="例：後半14番から集中力落ちた。蜂蜜ゼリーで少し回復した気がした。"/></FG>
      <SendBtn onClick={save}>📤 練習を送信する</SendBtn>
    </div>
  );
}

// ── PARTS ──
const Card    = ({title,children}) => <div style={S.card}><div style={S.cardTitle}>{title}</div>{children}</div>;
const FG      = ({label,children}) => <div style={{marginBottom:10}}><div style={{fontSize:11,color:"#8a9e90",marginBottom:5}}>{label}</div>{children}</div>;
const R2      = ({children}) => <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>{children}</div>;
const SendBtn = ({onClick,children}) => <button style={S.sendBtn} onClick={onClick}>{children}</button>;
const Chips   = ({opts,sel,multi,onChange,color="#4a9b6f"}) => <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>{opts.map(o=>{const on=sel.includes(o);return<button key={o} style={{padding:"6px 13px",borderRadius:20,border:`1px solid ${on?color:"#2e4235"}`,background:on?color:"transparent",color:on?"white":"#8a9e90",fontSize:12,cursor:"pointer"}} onClick={()=>onChange(multi?(on?sel.filter(s=>s!==o):[...sel,o]):(on?[]:[o]))}>{o}</button>;})}</div>;
const MoodR   = ({emojis,val,onChange}) => <div style={{display:"flex",gap:4}}>{emojis.map((e,i)=><button key={i} style={{flex:1,aspectRatio:"1",borderRadius:10,border:`1px solid ${val===i+1?"#c9a84c":"#2e4235"}`,background:val===i+1?"rgba(201,168,76,0.15)":"#223328",cursor:"pointer",fontSize:20,transform:val===i+1?"scale(1.1)":"scale(1)",transition:"all .15s"}} onClick={()=>onChange(i+1)}>{e}</button>)}</div>;
const Toggle  = ({label,val,onChange}) => <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #2e4235"}}><span style={{fontSize:13}}>{label}</span><div style={{width:44,height:24,borderRadius:12,background:val?"#4a9b6f":"#2e4235",cursor:"pointer",position:"relative",transition:"background .2s"}} onClick={()=>onChange(!val)}><div style={{width:18,height:18,borderRadius:9,background:"white",position:"absolute",top:3,left:val?23:3,transition:"left .2s"}}/></div></div>;

const dk="#0e1a14",dkCard="#1c2b21",dkBord="#2e4235",gold="#c9a84c";
const S = {
  root:{minHeight:"100vh",background:dk,fontFamily:"'Noto Sans JP',sans-serif",fontSize:14,maxWidth:480,margin:"0 auto"},
  header:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px 10px",borderBottom:`1px solid ${dkBord}`},
  logo:{fontFamily:"'Cormorant Garamond',serif",fontSize:22,fontWeight:300,letterSpacing:"0.1em",color:gold},
  headerDate:{fontSize:11,color:"#8a9e90"},
  syncPill:{display:"flex",alignItems:"center",gap:5,background:"#162019",border:`1px solid ${dkBord}`,borderRadius:20,padding:"4px 10px",fontSize:10,color:"#8a9e90"},
  syncDot:{width:6,height:6,borderRadius:"50%",flexShrink:0,display:"inline-block"},
  tabRow:{display:"flex",gap:3,padding:"8px 12px",borderBottom:`1px solid ${dkBord}`,overflowX:"auto"},
  tab:{flexShrink:0,padding:"5px 10px",borderRadius:18,border:`1px solid ${dkBord}`,background:"transparent",color:"#8a9e90",fontSize:11,cursor:"pointer",fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"},
  tabActive:{flexShrink:0,padding:"5px 10px",borderRadius:18,border:`1px solid ${gold}`,background:gold,color:dk,fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:700,display:"flex",flexDirection:"column",alignItems:"center",gap:1,position:"relative"},
  tabBadge:{position:"absolute",top:-4,right:-4,background:"#f0a500",color:"white",fontSize:9,fontWeight:700,padding:"1px 4px",borderRadius:8},
  panelWrap:{padding:14,paddingBottom:32},
  notice:{background:"rgba(201,168,76,0.08)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:10,padding:"10px 12px",fontSize:12,color:"#c8bfa8",marginBottom:12,lineHeight:1.7},
  card:{background:dkCard,border:`1px solid ${dkBord}`,borderRadius:13,padding:14,marginBottom:12},
  cardTitle:{fontSize:13,fontWeight:500,color:"#f2ead8",marginBottom:12},
  inp:{width:"100%",background:"#223328",border:`1px solid ${dkBord}`,borderRadius:8,color:"#f2ead8",fontFamily:"inherit",fontSize:13,padding:"9px 11px",outline:"none",WebkitAppearance:"none",boxSizing:"border-box"},
  uploadArea:{border:`2px dashed ${dkBord}`,borderRadius:11,padding:24,textAlign:"center",cursor:"pointer",display:"block",marginBottom:8},
  photoGrid:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginTop:7},
  thumb:{aspectRatio:"1",borderRadius:7,overflow:"hidden",position:"relative",background:"#223328"},
  delBtn:{position:"absolute",top:3,right:3,background:"rgba(0,0,0,0.7)",border:"none",color:"white",width:18,height:18,borderRadius:"50%",cursor:"pointer",fontSize:10},
  sendBtn:{width:"100%",padding:15,background:gold,border:"none",borderRadius:13,color:dk,fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:14,letterSpacing:"0.05em"},
  tlItem:{background:dkCard,border:`1px solid ${dkBord}`,borderRadius:11,padding:13,marginBottom:9},
  adviceBubble:{background:"#162019",border:`1px solid ${dkBord}`,borderRadius:13,padding:16,marginBottom:14},
  consultAvatar:{width:34,height:34,borderRadius:17,background:"#2e4235",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0},
  toast:{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:"#4a9b6f",color:"white",padding:"11px 24px",borderRadius:24,fontSize:13,fontWeight:500,zIndex:999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.35)"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
